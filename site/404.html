<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark"> <!-- This should prevent any noticeable flashing when dark mode is in use -->
    <title>404 Not Found - SPP Robotics (Team 5438)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" as="style">
    <link rel="preload" href="/css/site.css" as="style">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/css/site.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
</head>
<body>
    <div class="container-fluid">
        <br>
        <h1>404 Not Found</h1>
        <p>It looks like you've reached a dead end. Maybe try going <a id="back-link" href="#">back</a>?</p>
    </div>
    <script>
        const backLink = document.getElementById("back-link")
        backLink.addEventListener("click", (event) => {
            event.preventDefault()
            history.back()
        })
    </script>
</body>
</html>
